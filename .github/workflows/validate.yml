name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats ripgrep

      - name: Run validation suite
        run: bash ./scripts/validate.sh
